version: 1

graph:
  name: redbot-media-player-homeassistant-architecture
  description: Focused knowledge graph for redbot-media-player-homeassistant (home-assistant)

entities:
  - type: Config
    id_prefix: config
    properties:
      - name: name
        required: false
  - type: Document
    id_prefix: document
    properties:
      - name: name
        required: false
  - type: Integration
    id_prefix: integration
    properties:
      - name: name
        required: false
  - type: Module
    id_prefix: module
    properties:
      - name: name
        required: false
  - type: Repository
    id_prefix: repository
    properties:
      - name: name
        required: false

relations:
  - type: CONTAINS
    cardinality: many_to_many
  - type: HAS_CONFIG
    cardinality: many_to_many
  - type: IMPLEMENTS
    cardinality: many_to_many

provenance:
  required_fields: [source, extracted_at]

constraints:
  - rule: unique_node_id
  - rule: edge_endpoints_exist
  - rule: predicate_in_schema
